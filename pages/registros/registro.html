<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Sesión - POWER APP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../../css/general.css">
    <link rel="stylesheet" href="../../css/registro.css">
</head>

<body>

    <header>
        <h1>POWER APP</h1>
        <nav>
            <i class="fa-solid fa-house"></i> <a href="/pages/dashboard/dashboard.html"> Dashboard </a>
            <i class="fa-solid fa-user-plus"></i> <a href="/pages/registros/registro.html"> Registrar Sesión </a>
            <i class="fa-solid fa-dumbbell"></i> <a href="/pages/bloque/bloques.html"> Mis Bloques </a>
            <i class="fa-solid fa-gears"></i><a href="/pages/tecnicas/tecnica.html"> Técnica </a>
            <i class="fa-solid fa-clock-rotate-left"></i><a href="/pages/historial/historial.html"> Historial </a>
        </nav>

        <div>
            <p> Cristhian (-74 kg)</p>
            <form action="../../index.html">
                <button type="submit">Cerrar sesión</button>
            </form>
        </div>
    </header>

    <main>

        <header>
            <h1>Registrar Entrenamiento</h1>
        </header>

        <section id="panel-registro">

            <form class="formulario-entrenamiento" action="/pages/historial/historial.html" method="GET">

                <!-- Agrupación de formulario con Flexbox -->
                <div class="grupo-formulario">
                    <label>Fecha de la sesión:</label>
                    <input type="date" name="fecha" class="input-general" required>
                </div>

                <div class="grupo-formulario">
                    <label>Selecciona el Movimiento:</label>
                    <select name="movimiento" class="input-general" required>
                        <option value="">-- Elige un ejercicio --</option>
                        <option value="squat">Low-bar Squat</option>
                        <option value="bench">Bench Press</option>
                        <option value="deadlift">Sumo Deadlift</option>
                    </select>
                </div>

                <h3>Registro de Series</h3>

                <!-- La tabla se mantiene porque es el uso semántico correcto para estos datos -->
                <table class="tabla-series">
                    <tr>
                        <th>Serie</th>
                        <th>Peso (kg)</th>
                        <th>Reps</th>
                        <th>RPE (1-10)</th>
                    </tr>
                    <tr>
                        <td>1</td>
                        <td><input type="number" name="peso1" min="0" step="2.5" class="input-celda"></td>
                        <td><input type="number" name="reps1" min="1" class="input-celda"></td>
                        <td><input type="number" name="rpe1" min="1" max="10" step="0.5" class="input-celda"></td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td><input type="number" name="peso2" min="0" step="2.5" class="input-celda"></td>
                        <td><input type="number" name="reps2" min="1" class="input-celda"></td>
                        <td><input type="number" name="rpe2" min="1" max="10" step="0.5" class="input-celda"></td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td><input type="number" name="peso3" min="0" step="2.5" class="input-celda"></td>
                        <td><input type="number" name="reps3" min="1" class="input-celda"></td>
                        <td><input type="number" name="rpe3" min="1" max="10" step="0.5" class="input-celda"></td>
                    </tr>
                </table>

                <div class="collapse mt-3" id="alertaExito">
                    <div class="alert alert-custom text-center mx-auto mb-0" role="alert">
                        <i class="fa-solid fa-circle-check"></i> ¡Entrenamiento guardado con éxito!
                    </div>
                </div>

                <div class="grupo-formulario">
                    <label>Comentarios del entrenamiento:</label>
                    <input type="text" name="notas" class="input-general">
                </div>

                <button type="button" id="btn-guardar" data-bs-toggle="collapse" data-bs-target="#alertaExito"
                    aria-expanded="false" aria-controls="alertaExito">
                    Guardar Entrenamiento
                </button>
            </form>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
