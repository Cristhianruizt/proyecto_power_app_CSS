<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>POWER APP - Login</title>
    <link rel="icon" href="/iconos/world.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body class="login">

    <aside class="iconos-superiores">
        <i class="fa-solid fa-house"></i> 
        <i class="fa-solid fa-user"></i> 
        <i class="fa-solid fa-envelope"></i> 
        <i class="fa-solid fa-phone"></i> 
        <i class="fa-solid fa-cart-shopping"></i> 
        <i class="fa-solid fa-heart"></i> 
        <i class="fa-brands fa-facebook"></i> 
        <i class="fa-brands fa-instagram"></i> 
    </aside>

    <div class="contenedor-split">
        
        <header class="mitad-logo">
            <img src="img/logo.png" alt="Logo de POWER APP">
            <p>Tu plataforma de entrenamiento de powerlifting</p>
        </header>

        <main class="mitad-login">
            
            <section id="panel-login">
                <h2>Inicia sesión en tu cuenta</h2>

                <form class="formulario-acceso" action="/pages/dashboard/dashboard.html" method="GET">
                    <label>Correo Electrónico</label>
                    <input type="email" class="input-texto" name="correo" placeholder="tu@email.com" required>

                    <label>Contraseña</label>
                    <input type="password" class="input-texto" name="password" placeholder="********" required>

                    <button type="submit" id="btn-ingreso">
                        Ingresar
                    </button>
                </form>

                <p class="nota-registro">
                    ¿No tienes cuenta? <a href="https://workspace.google.com/intl/es/gmail/" target="_blank"> Regístrate </a>
                </p>
            </section>
            
        </main>

    </div>

</body>

</html>
